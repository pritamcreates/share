<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEPSE Pro — All 271 Listed Companies</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a0f;--panel:#0d1117;--panel2:#111620;--panel3:#161d2b;
  --border:#1e2840;--border2:#253050;--text:#c9d1e0;--text2:#8a95aa;
  --gold:#f0b90b;--gold2:#f8d444;--green:#00d68f;--red:#f6465d;--blue:#3d7fff;--blue2:#5a9fff;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--display:'Syne',sans-serif;--r:8px;
}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;font-size:13px;}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* TOPBAR */
.topbar{height:28px;background:rgba(8,10,15,.95);border-bottom:1px solid var(--border);display:flex;align-items:center;flex-shrink:0;z-index:200;}
.ticker-wrap{overflow:hidden;flex:1;height:100%;}
.ticker-inner{display:inline-flex;white-space:nowrap;animation:scroll 50s linear infinite;height:100%;align-items:center;}
.ticker-inner:hover{animation-play-state:paused}
.t-item{display:inline-flex;align-items:center;gap:5px;padding:0 16px;border-right:1px solid var(--border);font-family:var(--mono);font-size:10px;}
.t-sym{color:var(--text);font-weight:500;}.t-p{color:var(--text2);}
.up{color:var(--green);}.dn{color:var(--red);}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.topbar-right{display:flex;align-items:center;height:100%;border-left:1px solid var(--border);flex-shrink:0;}
.tb-item{font-family:var(--mono);font-size:10px;color:var(--text2);padding:0 12px;height:100%;display:flex;align-items:center;border-right:1px solid var(--border);gap:5px;}
.tb-item.live{color:var(--green);}
.live-dot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:blink 1.8s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* HEADER */
.header{height:44px;background:rgba(13,17,23,.97);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0;flex-shrink:0;z-index:100;backdrop-filter:blur(12px);}
.logo{display:flex;align-items:center;gap:8px;padding:0 16px;border-right:1px solid var(--border);height:100%;flex-shrink:0;cursor:pointer;text-decoration:none;}
.logo-mark{width:28px;height:28px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:13px;font-weight:800;color:#080a0f;}
.logo-name{font-family:var(--display);font-size:14px;font-weight:800;color:var(--text);}
.logo-name em{color:var(--gold);font-style:normal;}
.page-title{font-family:var(--display);font-size:13px;font-weight:700;color:var(--text);padding:0 16px;border-right:1px solid var(--border);height:100%;display:flex;align-items:center;gap:8px;}
.page-title span{font-size:10px;color:var(--text2);font-family:var(--mono);}
.hdr-right{display:flex;align-items:center;gap:0;height:100%;border-left:1px solid var(--border);flex-shrink:0;margin-left:auto;}
.hdr-btn{font-family:var(--mono);font-size:10px;font-weight:500;border:none;cursor:pointer;color:var(--text2);padding:0 14px;height:100%;transition:all .15s;border-left:1px solid var(--border);background:transparent;display:flex;align-items:center;gap:5px;white-space:nowrap;text-decoration:none;}
.hdr-btn:hover{color:var(--text);background:var(--panel2);}
.hdr-btn.primary{color:var(--gold);}
.hdr-btn.primary:hover{background:rgba(240,185,11,.08);}
.hdr-btn.danger{color:var(--red);}
.hdr-btn.danger:hover{background:rgba(246,70,93,.08);}

/* MAIN */
.main-body{flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* CONTROLS BAR */
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 14px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
.ctrl-search{position:relative;flex:1;min-width:200px;max-width:320px;}
.ctrl-search input{width:100%;font-family:var(--mono);font-size:11px;background:var(--panel2);border:1px solid var(--border2);color:var(--text);padding:6px 10px 6px 30px;border-radius:6px;outline:none;transition:border-color .15s;}
.ctrl-search input:focus{border-color:rgba(240,185,11,.4);}
.ctrl-search::before{content:'🔍';position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:11px;pointer-events:none;}
.ctrl-select{font-family:var(--mono);font-size:10px;background:var(--panel2);border:1px solid var(--border2);color:var(--text);padding:6px 10px;border-radius:6px;outline:none;cursor:pointer;}
.ctrl-select:focus{border-color:rgba(240,185,11,.4);}
.ctrl-select option{background:var(--panel2);}
.ctrl-badge{font-family:var(--mono);font-size:10px;background:rgba(240,185,11,.1);color:var(--gold);border:1px solid rgba(240,185,11,.25);padding:4px 10px;border-radius:4px;white-space:nowrap;}
.ctrl-btn{font-family:var(--mono);font-size:10px;background:var(--panel2);border:1px solid var(--border2);color:var(--text2);padding:6px 12px;border-radius:6px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;}
.ctrl-btn:hover{border-color:var(--border);color:var(--text);}
.ctrl-btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#080a0f;border:none;font-weight:700;}
.ctrl-btn.gold:hover{box-shadow:0 4px 16px rgba(240,185,11,.3);}

/* SECTOR TABS */
.sector-tabs{display:flex;gap:0;overflow-x:auto;padding:0 14px;background:var(--panel2);border-bottom:1px solid var(--border);flex-shrink:0;}
.sector-tabs::-webkit-scrollbar{height:0}
.stab{font-family:var(--mono);font-size:10px;font-weight:500;padding:8px 14px;border-bottom:2px solid transparent;cursor:pointer;color:var(--text2);transition:all .15s;white-space:nowrap;border-right:1px solid var(--border);}
.stab:hover{color:var(--text);background:var(--panel3);}
.stab.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(240,185,11,.04);}
.stab-count{font-size:9px;color:var(--text2);margin-left:4px;}

/* TABLE */
.tbl-area{flex:1;overflow:auto;padding:14px;}
.tbl-wrap{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{border-bottom:1px solid var(--border2);background:var(--panel2);}
th{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;color:var(--text2);padding:9px 10px;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0;background:var(--panel2);z-index:10;}
th:hover{color:var(--text);}
th.sorted{color:var(--gold);}
td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:11px;white-space:nowrap;font-family:var(--mono);}
td.name-cell{font-family:var(--font);font-size:12px;white-space:normal;max-width:180px;}
tbody tr{cursor:pointer;transition:background .1s;}
tbody tr:hover{background:rgba(61,127,255,.04);}
tbody tr:last-child td{border-bottom:none;}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:.3px;text-transform:uppercase;border:1px solid;}
.b-buy{background:rgba(0,214,143,.1);color:var(--green);border-color:rgba(0,214,143,.25);}
.b-wait{background:rgba(240,185,11,.1);color:var(--gold);border-color:rgba(240,185,11,.25);}
.b-avoid{background:rgba(246,70,93,.1);color:var(--red);border-color:rgba(246,70,93,.25);}
.b-watch{background:rgba(61,127,255,.1);color:var(--blue2);border-color:rgba(61,127,255,.25);}
.b-neutral{background:rgba(138,149,170,.1);color:var(--text2);border-color:var(--border2);}
.sector-tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.2px;}

/* SCORE BAR */
.sbar{display:flex;align-items:center;gap:7px;}
.sbar-track{flex:1;height:3px;background:var(--border2);border-radius:2px;overflow:hidden;min-width:44px;}
.sbar-fill{height:100%;border-radius:2px;}
.sbar-num{font-family:var(--mono);font-size:11px;font-weight:500;min-width:26px;text-align:right;}

/* STATS ROW */
.stats-row{display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--panel);}
.stat-box{flex:1;padding:10px 16px;border-right:1px solid var(--border);text-align:center;}
.stat-box:last-child{border-right:none;}
.sb-val{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--text);}
.sb-lbl{font-family:var(--mono);font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

/* DETAIL MODAL */
.modal-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:flex;align-items:flex-start;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.detail-panel{width:min(540px,100vw);height:100vh;overflow-y:auto;background:var(--panel);border-left:1px solid var(--border2);padding:20px;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);}
.modal-overlay.open .detail-panel{transform:translateX(0);}
.dp-close{float:right;background:var(--panel2);border:1px solid var(--border2);color:var(--text2);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.dp-close:hover{border-color:var(--red);color:var(--red);}
.dp-header{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.dp-sym{font-family:var(--display);font-size:26px;font-weight:800;color:var(--gold);}
.dp-name{font-size:13px;color:var(--text2);margin-bottom:6px;}
.dp-sector{display:inline-block;font-family:var(--mono);font-size:9px;font-weight:600;padding:3px 8px;border-radius:4px;background:rgba(61,127,255,.1);color:var(--blue2);border:1px solid rgba(61,127,255,.25);}
.dp-score{font-family:var(--display);font-size:48px;font-weight:800;text-align:center;padding:16px;background:var(--panel2);border-radius:var(--r);margin-bottom:14px;border:1px solid var(--border);}
.met-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.met-item{background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;}
.met-key{font-family:var(--mono);font-size:9px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;}
.met-val{font-family:var(--mono);font-size:16px;font-weight:500;margin-top:3px;}
.timing-panel{border-radius:var(--r);padding:12px 14px;margin-bottom:14px;border:1px solid;}
.tp-buy{background:rgba(0,214,143,.07);border-color:rgba(0,214,143,.2);}
.tp-wait{background:rgba(240,185,11,.07);border-color:rgba(240,185,11,.2);}
.tp-avoid{background:rgba(246,70,93,.07);border-color:rgba(246,70,93,.2);}
.tp-watch{background:rgba(61,127,255,.07);border-color:rgba(61,127,255,.2);}
.tp-title{font-size:13px;font-weight:700;margin-bottom:6px;font-family:var(--display);}
.tp-reason{font-size:11px;color:var(--text2);line-height:1.7;}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--panel2);color:var(--text);border:1px solid var(--border2);padding:8px 16px;border-radius:999px;font-size:11px;font-family:var(--mono);z-index:500;opacity:0;transition:all .2s ease;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .2s ease both;}

/* GRID VIEW */
.grid-area{flex:1;overflow:auto;padding:14px;}
.companies-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.co-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative;overflow:hidden;}
.co-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(240,185,11,.2),transparent);}
.co-card:hover{border-color:var(--gold);box-shadow:0 0 20px rgba(240,185,11,.06);}
.co-sym{font-family:var(--display);font-size:14px;font-weight:800;color:var(--gold);margin-bottom:2px;}
.co-name{font-size:10px;color:var(--text2);margin-bottom:8px;line-height:1.4;min-height:28px;}
.co-price{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--text);}
.co-chg{font-family:var(--mono);font-size:10px;}
.co-score-bar{height:2px;background:var(--border2);border-radius:1px;overflow:hidden;margin:8px 0;}
.co-score-fill{height:100%;border-radius:1px;}
.co-foot{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--text2);}
.view-toggle{display:flex;background:var(--panel2);border:1px solid var(--border2);border-radius:6px;overflow:hidden;}
.vt-btn{font-family:var(--mono);font-size:10px;padding:5px 10px;cursor:pointer;color:var(--text2);border:none;background:none;transition:all .15s;}
.vt-btn.active{background:var(--panel3);color:var(--gold);}

/* NO RESULTS */
.no-results{text-align:center;padding:60px 20px;color:var(--text2);}
.no-results h3{font-family:var(--display);font-size:18px;color:var(--text);margin-bottom:8px;}
</style>
</head>

    <div class="tb-item" id="marketStatus">NEPSE OPEN</div>

</div>

<!-- HEADER -->

    <button class="hdr-btn danger" onclick="logout()">⏻ Exit</button>
  </div>
</div>

<!-- STATS ROW -->
<div class="stats-row" id="statsRow">

  <div class="stat-box"><div class="sb-val" style="color:var(--blue2)" id="st-watch">—</div><div class="sb-lbl">Watch</div></div>
  <div class="stat-box"><div class="sb-val" style="color:var(--gold)" id="st-wait">—</div><div class="sb-lbl">Wait</div></div>

</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="ctrl-search"><input type="text" id="searchInput" placeholder="Search symbol, name, or sector..." oninput="applyFilters()"></div>
  <select class="ctrl-select" id="sortSel" onchange="applyFilters()">
    <option value="score_desc">Score ↓ (Best First)</option>
    <option value="score_asc">Score ↑</option>
    <option value="symbol_asc">Symbol A→Z</option>
    <option value="symbol_desc">Symbol Z→A</option>
    <option value="price_desc">Price ↓</option>
    <option value="price_asc">Price ↑</option>
    <option value="pe_asc">P/E ↑ (Cheapest)</option>
    <option value="roe_desc">ROE% ↓ (Best)</option>
    <option value="div_desc">Dividend% ↓</option>
  </select>
  <select class="ctrl-select" id="signalSel" onchange="applyFilters()">
    <option value="">All Signals</option>
    <option value="buy">✅ Buy</option>
    <option value="watch">👀 Watch</option>
    <option value="wait">⏳ Wait</option>
    <option value="avoid">⛔ Avoid</option>
  </select>
  <div class="view-toggle">
    <button class="vt-btn active" id="vt-table" onclick="setView('table')">⊟ Table</button>
    <button class="vt-btn" id="vt-grid" onclick="setView('grid')">⊞ Grid</button>
  </div>
  <span class="ctrl-badge" id="countBadge">271 companies</span>
  <button class="ctrl-btn" onclick="clearFilters()">✕ Clear</button>
</div>

<!-- SECTOR TABS -->
<div class="sector-tabs" id="sectorTabs"></div>

<!-- TABLE VIEW -->
<div class="tbl-area fade-in" id="tableView">
  <div class="tbl-wrap">
    <table id="mainTable">
      <thead><tr>
        <th onclick="sortBy('rank')">#</th>
        <th onclick="sortBy('symbol')">Symbol</th>
        <th onclick="sortBy('name')">Company</th>
        <th onclick="sortBy('sector')">Sector</th>
        <th onclick="sortBy('score')" id="th-score" class="sorted">Score ↓</th>
        <th>Signal</th>
        <th onclick="sortBy('price_current')">Price (NPR)</th>
        <th onclick="sortBy('pe')">P/E</th>
        <th onclick="sortBy('roe')">ROE%</th>
        <th onclick="sortBy('debt_to_equity')">D/E</th>
        <th onclick="sortBy('profit_growth_5y')">Prof G%</th>
        <th onclick="sortBy('dividend_yield')">Div%</th>
        <th onclick="sortBy('market_cap')">Mkt Cap (M)</th>
        <th onclick="sortBy('pct52wHigh')">vs 52W Hi</th>
        <th>Detail</th>
      </tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<!-- GRID VIEW (hidden by default) -->
<div class="grid-area fade-in" id="gridView" style="display:none">
  <div class="companies-grid" id="gridBody"></div>
</div>

<!-- DETAIL PANEL -->
<div class="modal-overlay" id="detailModal" onclick="closeDetail(event)">
  <div class="detail-panel" id="detailPanel">
    <button class="dp-close" onclick="closeModal()">✕</button>
    <div id="detailContent"></div>
  </div>
</div>

<div id="toast"></div>

// Compute score + timing signal for each company
function computeScore(c){
  if(c.sector==='Mutual Fund'||c.sector==='Others')return {score:Math.round(50+c.dividend_yield*2),timing:{label:'wait',class:'b-wait'}};
  let s=0;
  if(c.roe>=20)s+=25;else if(c.roe>=15)s+=18;else if(c.roe>=10)s+=12;else if(c.roe>=5)s+=6;
  if(c.pe&&c.pe<=12)s+=20;else if(c.pe&&c.pe<=18)s+=15;else if(c.pe&&c.pe<=25)s+=10;else if(c.pe)s+=5;
  if(c.profit_growth_5y>=18)s+=20;else if(c.profit_growth_5y>=12)s+=15;else if(c.profit_growth_5y>=7)s+=10;else s+=5;
  if(c.dividend_yield>=3.5)s+=15;else if(c.dividend_yield>=2.5)s+=11;else if(c.dividend_yield>=1.5)s+=7;else s+=3;
  const pct52=(c.price_current/c.price_52w_high)*100;
  if(pct52<70)s+=12;else if(pct52<80)s+=9;else if(pct52<90)s+=6;else s+=2;
  if(c.debt_to_equity<2)s+=8;else if(c.debt_to_equity<4)s+=5;else s+=2;
  s=Math.min(100,Math.max(0,s));
  const pctFrom52=(((c.price_current-c.price_52w_high)/c.price_52w_high)*100).toFixed(1);
  let timing;
  if(s>=70&&pct52<85){timing={label:'buy',class:'b-buy'};}
  else if(s>=55&&pct52<92){timing={label:'watch',class:'b-watch'};}
  else if(s>=40){timing={label:'wait',class:'b-wait'};}
  else{timing={label:'avoid',class:'b-avoid'};}
  return {score:s,timing,pct52wHigh:+pctFrom52};
}

const COMPANIES=ALL_COMPANIES.map((c,i)=>{
  const {score,timing,pct52wHigh}=computeScore(c);
  return{...c,score,timing,pct52wHigh,rank:i+1};
}).sort((a,b)=>b.score-a.score).map((c,i)=>({...c,rank:i+1}));

function buildTabs(){
  const tabs=document.getElementById('sectorTabs');
  tabs.innerHTML=SECTORS.map(s=>{
    const cnt=s==='All'?COMPANIES.length:COMPANIES.filter(c=>c.sector===s).length;
    return`<div class="stab${s==='All'?' active':''}" onclick="setSector('${s}')" id="stab-${s.replace(/\s/g,'_')}">${s}<span class="stab-count">${cnt}</span></div>`;
  }).join('');
}

function setSector(s){
  currentSector=s;
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));
  document.getElementById('stab-'+s.replace(/\s/g,'_')).classList.add('active');
  applyFilters();
}

function applyFilters(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const sig=document.getElementById('signalSel').value;
  filtered=COMPANIES.filter(c=>{
    if(currentSector!=='All'&&c.sector!==currentSector)return false;
    if(q&&!c.symbol.toLowerCase().includes(q)&&!c.name.toLowerCase().includes(q)&&!c.sector.toLowerCase().includes(q))return false;
    if(sig&&c.timing.label!==sig)return false;
    return true;
  });
  sortFiltered();
  renderStats();
  renderTable();
  renderGrid();
  document.getElementById('countBadge').textContent=`${filtered.length} companies`;
}

function sortFiltered(){
  const s=document.getElementById('sortSel').value;
  const [col,dir]=s.split('_');
  filtered.sort((a,b)=>{
    let av=a[col==='symbol'?'symbol':col==='name'?'name':col==='pe'?'pe':col==='roe'?'roe':col==='price'?'price_current':col==='div'?'dividend_yield':col];
    let bv=b[col==='symbol'?'symbol':col==='name'?'name':col==='pe'?'pe':col==='roe'?'roe':col==='price'?'price_current':col==='div'?'dividend_yield':col];
    if(av===null||av===undefined)av=dir==='asc'?Infinity:-Infinity;
    if(bv===null||bv===undefined)bv=dir==='asc'?Infinity:-Infinity;
    if(typeof av==='string')return dir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
    return dir==='asc'?av-bv:bv-av;
  });
}

function sortBy(col){
  if(currentSort.col===col){currentSort.dir=currentSort.dir==='desc'?'asc':'desc';}
  else{currentSort={col,dir:'desc'};}
  // update sort select
  const sortMap={score:'score_desc',symbol:'symbol_asc',name:'symbol_asc',sector:'symbol_asc',price_current:'price_desc',pe:'pe_asc',roe:'roe_desc',dividend_yield:'div_desc',market_cap:'price_desc',pct52wHigh:'price_asc'};
  applyFilters();
}

function clearFilters(){
  document.getElementById('searchInput').value='';
  document.getElementById('signalSel').value='';
  document.getElementById('sortSel').value='score_desc';
  currentSector='All';
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));
  document.getElementById('stab-All').classList.add('active');
  applyFilters();
}

function renderStats(){
  const buy=COMPANIES.filter(c=>c.timing.label==='buy').length;
  const watch=COMPANIES.filter(c=>c.timing.label==='watch').length;
  const wait=COMPANIES.filter(c=>c.timing.label==='wait').length;
  const avoid=COMPANIES.filter(c=>c.timing.label==='avoid').length;
  document.getElementById('st-total').textContent=filtered.length;
  document.getElementById('st-buy').textContent=buy;
  document.getElementById('st-watch').textContent=watch;
  document.getElementById('st-wait').textContent=wait;
  document.getElementById('st-avoid').textContent=avoid;
}

// Score color
function scoreColor(s){return s>=70?'var(--green)':s>=50?'var(--gold)':s>=30?'var(--text2)':'var(--red)';}
function sectorTag(sector){
  const c=SECTOR_COLORS[sector]||'rgba(138,149,170,.1)';
  return`<span style="background:${c};color:var(--text);padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600;">${sector}</span>`;
}

function renderTable(){
  const tbody=document.getElementById('tableBody');
  if(!filtered.length){tbody.innerHTML=`<tr><td colspan="15" style="text-align:center;padding:40px;color:var(--text2)">No companies match your filters</td></tr>`;return;}
  tbody.innerHTML=filtered.map((c,i)=>`
    <tr onclick="openDetail('${c.symbol}')">
      <td>${i+1}</td>
      <td style="color:var(--gold);font-weight:600;font-family:var(--display)">${c.symbol}</td>
      <td class="name-cell">${c.name}</td>
      <td>${sectorTag(c.sector)}</td>
      <td>
        <div class="sbar">
          <div class="sbar-track"><div class="sbar-fill" style="width:${c.score}%;background:${scoreColor(c.score)}"></div></div>
          <span class="sbar-num" style="color:${scoreColor(c.score)}">${c.score}</span>
        </div>
      </td>
      <td><span class="badge ${c.timing.class}">${c.timing.label}</span></td>
      <td>${c.price_current!=null?'NPR '+c.price_current.toLocaleString():'-'}</td>
      <td>${c.pe?c.pe.toFixed(1):'—'}</td>
      <td style="color:${c.roe>=15?'var(--green)':c.roe>=8?'var(--text)':'var(--red)'}">${c.roe?c.roe.toFixed(1)+'%':'—'}</td>
      <td>${c.debt_to_equity!=null?c.debt_to_equity.toFixed(1):'—'}</td>
      <td style="color:${c.profit_growth_5y>=15?'var(--green)':c.profit_growth_5y>=8?'var(--text)':'var(--text2)'}">${c.profit_growth_5y?'+'+c.profit_growth_5y+'%':'—'}</td>
      <td style="color:var(--gold)">${c.dividend_yield?c.dividend_yield.toFixed(1)+'%':'—'}</td>
      <td>${c.market_cap?(c.market_cap/1000).toFixed(0)+'B':'—'}</td>
      <td style="color:${c.pct52wHigh>-10?'var(--green)':c.pct52wHigh>-20?'var(--gold)':'var(--red)'}">${c.pct52wHigh!=null?c.pct52wHigh+'%':'—'}</td>
      <td><button class="ctrl-btn" style="padding:2px 8px;font-size:9px" onclick="event.stopPropagation();openDetail('${c.symbol}')">Detail →</button></td>
    </tr>
  `).join('');
}

function renderGrid(){
  if(currentView!=='grid')return;
  const grid=document.getElementById('gridBody');
  if(!filtered.length){grid.innerHTML=`<div class="no-results"><h3>No Results</h3><p>Try adjusting your filters</p></div>`;return;}
  grid.innerHTML=filtered.map(c=>`
    <div class="co-card" onclick="openDetail('${c.symbol}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div class="co-sym">${c.symbol}</div>
        <span class="badge ${c.timing.class}" style="font-size:8px">${c.timing.label}</span>
      </div>
      <div class="co-name">${c.name}</div>
      <div class="co-score-bar"><div class="co-score-fill" style="width:${c.score}%;background:${scoreColor(c.score)}"></div></div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="co-price">${c.price_current?'NPR '+c.price_current.toLocaleString():'-'}</div>
        <div class="co-chg" style="color:${scoreColor(c.score)}">${c.score}/100</div>
      </div>
      <div class="co-foot" style="margin-top:6px">
        <span>${c.pe?'P/E '+c.pe.toFixed(1):'MF/Bond'}</span>
        <span style="color:var(--gold)">${c.dividend_yield?c.dividend_yield.toFixed(1)+'% div':''}</span>
      </div>
    </div>
  `).join('');
}

function setView(v){
  currentView=v;
  document.getElementById('vt-table').classList.toggle('active',v==='table');
  document.getElementById('vt-grid').classList.toggle('active',v==='grid');
  document.getElementById('tableView').style.display=v==='table'?'block':'none';
  document.getElementById('gridView').style.display=v==='grid'?'block':'none';
  if(v==='grid')renderGrid();
}

// ─── DETAIL PANEL ───
function openDetail(sym){
  const c=COMPANIES.find(x=>x.symbol===sym);if(!c)return;
  const sc=scoreColor(c.score);
  const reasons={
    buy:`${c.symbol} shows strong fundamentals with ROE of ${c.roe}%, trading at ${c.pct52wHigh}% from its 52-week high. P/E of ${c.pe||'N/A'} suggests reasonable valuation. Consider accumulating on dips.`,
    watch:`${c.symbol} has decent fundamentals (ROE ${c.roe}%) but valuation timing is mixed. Watch for a better entry point — currently ${c.pct52wHigh}% from 52-week high.`,
    wait:`${c.symbol} fundamentals need improvement or valuation is stretched. ROE at ${c.roe}% and score of ${c.score}/100. Wait for improvement before investing.`,
    avoid:`${c.symbol} scores ${c.score}/100. Weak fundamentals or poor momentum. ROE of ${c.roe}% is below threshold. Avoid until fundamentals improve significantly.`
  };
  document.getElementById('detailContent').innerHTML=`
    <div class="dp-header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="dp-sym">${c.symbol}</div>
          <div class="dp-name">${c.name}</div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <span class="dp-sector">${c.sector}</span>
            <span class="badge ${c.timing.class}">${c.timing.label.toUpperCase()}</span>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-family:var(--mono);font-size:18px;font-weight:600;color:var(--text)">${c.price_current?'NPR '+c.price_current.toLocaleString():'-'}</div>
          <div style="font-size:10px;color:var(--text2)">${c.pct52wHigh!=null?c.pct52wHigh+'% from 52W high':''}</div>
        </div>
      </div>
    </div>
    <div class="dp-score" style="color:${sc}">${c.score}<span style="font-size:16px;color:var(--text2);font-family:var(--mono)">/100</span><div style="font-family:var(--mono);font-size:10px;color:var(--text2);margin-top:4px">Fundamental Score</div></div>
    <div class="timing-panel tp-${c.timing.label}">
      <div class="tp-title" style="color:${sc}">${c.timing.label==='buy'?'✅ Good Entry':c.timing.label==='watch'?'👀 Watch for Entry':c.timing.label==='wait'?'⏳ Wait for Better Setup':'⛔ Avoid Now'}</div>
      <div class="tp-reason">${reasons[c.timing.label]||''}</div>
    </div>
    <div class="met-grid">
      <div class="met-item"><div class="met-key">Current Price</div><div class="met-val">NPR ${c.price_current?c.price_current.toLocaleString():'-'}</div></div>
      <div class="met-item"><div class="met-key">P/E Ratio</div><div class="met-val" style="color:${c.pe&&c.pe<18?'var(--green)':'var(--text)'}">${c.pe?c.pe.toFixed(1):'N/A'}</div></div>
      <div class="met-item"><div class="met-key">ROE %</div><div class="met-val" style="color:${c.roe>=15?'var(--green)':c.roe>=8?'var(--text)':'var(--red)'}">${c.roe?c.roe.toFixed(1)+'%':'—'}</div></div>
      <div class="met-item"><div class="met-key">Debt / Equity</div><div class="met-val" style="color:${c.debt_to_equity<3?'var(--green)':c.debt_to_equity<6?'var(--gold)':'var(--red)'}">${c.debt_to_equity!=null?c.debt_to_equity.toFixed(1):'—'}</div></div>
      <div class="met-item"><div class="met-key">5Y Profit Growth</div><div class="met-val" style="color:${c.profit_growth_5y>=12?'var(--green)':'var(--text)'}">${c.profit_growth_5y?'+'+c.profit_growth_5y+'%':'—'}</div></div>
      <div class="met-item"><div class="met-key">5Y Revenue Growth</div><div class="met-val">${c.revenue_growth_5y?'+'+c.revenue_growth_5y+'%':'—'}</div></div>
      <div class="met-item"><div class="met-key">Dividend Yield</div><div class="met-val" style="color:var(--gold)">${c.dividend_yield?c.dividend_yield.toFixed(1)+'%':'—'}</div></div>
      <div class="met-item"><div class="met-key">Market Cap</div><div class="met-val">${c.market_cap?(c.market_cap>=1000?(c.market_cap/1000).toFixed(1)+'B':''+c.market_cap+'M'):'—'}</div></div>
      <div class="met-item"><div class="met-key">52W High</div><div class="met-val">NPR ${c.price_52w_high?c.price_52w_high.toLocaleString():'-'}</div></div>
      <div class="met-item"><div class="met-key">52W Low</div><div class="met-val">NPR ${c.price_52w_low?c.price_52w_low.toLocaleString():'-'}</div></div>
    </div>
    <div style="margin-top:8px">
      <div style="font-family:var(--mono);font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">52-Week Price Range</div>
      <div style="position:relative;height:8px;background:var(--border2);border-radius:4px;margin-bottom:4px">
        <div style="position:absolute;left:0;height:100%;width:${((c.price_current-c.price_52w_low)/(c.price_52w_high-c.price_52w_low)*100).toFixed(1)}%;background:linear-gradient(90deg,var(--red),var(--gold),var(--green));border-radius:4px"></div>
        <div style="position:absolute;top:-3px;left:${((c.price_current-c.price_52w_low)/(c.price_52w_high-c.price_52w_low)*100).toFixed(1)}%;transform:translateX(-50%);width:14px;height:14px;background:var(--text);border-radius:50%;border:2px solid var(--bg)"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--text2)">
        <span>Low: NPR ${c.price_52w_low?.toLocaleString()}</span>
        <span style="color:var(--text)">Current: NPR ${c.price_current?.toLocaleString()}</span>
        <span>High: NPR ${c.price_52w_high?.toLocaleString()}</span>
      </div>
    </div>
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">
      <div style="font-size:10px;color:var(--text2);text-align:center;line-height:1.6">⚠ Research tool only. Not financial advice. Always do your own due diligence before investing.</div>
    </div>
  `;
  document.getElementById('detailModal').classList.add('open');
}

function closeModal(){document.getElementById('detailModal').classList.remove('open');}
function closeDetail(e){if(e.target===document.getElementById('detailModal'))closeModal();}

// ─── EXPORT ───
document.getElementById('exportBtn').addEventListener('click',()=>{
  const csv=['Symbol,Name,Sector,Score,Signal,Price,PE,ROE%,DE,ProfitG%,DivYield%,MarketCap,52WH,52WL'].concat(
    filtered.map(c=>`${c.symbol},"${c.name}",${c.sector},${c.score},${c.timing.label},${c.price_current||''},${c.pe||''},${c.roe||''},${c.debt_to_equity||''},${c.profit_growth_5y||''},${c.dividend_yield||''},${c.market_cap||''},${c.price_52w_high||''},${c.price_52w_low||''}`)
  ).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='nepse_all_companies.csv';a.click();
});

buildTabs();
